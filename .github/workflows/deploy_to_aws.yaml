name: CICD pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Install
      - name: Install dependencies
        run: npm install

      # 4. Build Next.js
      - name: Build project
        run: npm run build

      # 5. Deploy files to EC2
      - name: Deploy to EC2
        uses: easingthemes/ssh-deploy@v5.0.3
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ec2-13-61-105-166.eu-north-1.compute.amazonaws.com
          REMOTE_USER: ubuntu
          TARGET: /var/www/ventionzz/

          SOURCE: "."
          EXCLUDE: |
            node_modules
            .git
            .github
            .next/cache
            *.log

      # 6. Restart app on server
      - name: Restart server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ec2-13-61-105-166.eu-north-1.compute.amazonaws.com
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/ventionzz

            echo "Installing production deps..."
            npm install --production

            echo "Restarting app..."
            pm2 restart ventionzz || pm2 start npm --name "ventionzz" -- start
