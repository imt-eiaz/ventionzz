name: CICD pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------
      # 1. Checkout code
      # -----------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------
      # 2. Setup Node
      # -----------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # -----------------------
      # 3. Install ROOT deps (optional if monorepo)
      # -----------------------
      - name: Install root dependencies
        run: npm install

      # 6. Deploy ONLY production files
      # -----------------------
      - name: Deploy to EC2
        uses: easingthemes/ssh-deploy@v5.0.3
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ec2-13-61-105-166.eu-north-1.compute.amazonaws.com
          REMOTE_USER: ubuntu
          TARGET: "/var/www/ventionzz/"

          # IMPORTANT: only send production output
          SOURCE: "."

          EXCLUDE: |
            node_modules
            .git
            .github
            frontend/node_modules
            backend/node_modules
            frontend/.next/cache
            backend/src
            frontend/src
